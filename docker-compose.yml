services:
  backend:
    build:
      context: ./backend
    container_name: admin-it-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - ACCEPT_EULA=Y
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
    container_name: admin-it-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
